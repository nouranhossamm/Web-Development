<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="300" fill="#ffffff"/>

  <!-- Tight coupling -->
  <text x="200" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0392b">Tight (High) Coupling</text>
  <rect x="80" y="60" width="120" height="70" rx="8" fill="#f9d5d3" stroke="#c0392b" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-size="14" fill="#2c3e50">Class A</text>
  <rect x="260" y="60" width="120" height="70" rx="8" fill="#f9d5d3" stroke="#c0392b" stroke-width="2"/>
  <text x="320" y="100" text-anchor="middle" font-size="14" fill="#2c3e50">Class B</text>
  <line x1="200" y1="95" x2="260" y2="95" stroke="#c0392b" stroke-width="3"/>
  <line x1="200" y1="80" x2="260" y2="80" stroke="#c0392b" stroke-width="3"/>
  <line x1="200" y1="110" x2="260" y2="110" stroke="#c0392b" stroke-width="3"/>
  <text x="230" y="150" text-anchor="middle" font-size="12" fill="#c0392b">many direct dependencies</text>
  <text x="230" y="170" text-anchor="middle" font-size="12" fill="#c0392b">changes in B break A</text>

  <!-- Loose coupling -->
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#27ae60">Loose Coupling</text>
  <rect x="480" y="60" width="120" height="70" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="540" y="100" text-anchor="middle" font-size="14" fill="#2c3e50">Class A</text>

  <rect x="640" y="80" width="130" height="35" rx="6" fill="#ffffff" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="705" y="102" text-anchor="middle" font-size="12" fill="#27ae60">«interface»</text>

  <line x1="600" y1="95" x2="640" y2="95" stroke="#27ae60" stroke-width="3"/>

  <rect x="640" y="160" width="130" height="60" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="705" y="195" text-anchor="middle" font-size="14" fill="#2c3e50">Class B</text>
  <line x1="705" y1="115" x2="705" y2="160" stroke="#27ae60" stroke-width="3"/>

  <text x="640" y="250" text-anchor="middle" font-size="12" fill="#27ae60">A depends on abstraction, not B directly</text>
</svg>
