<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="340" fill="#ffffff"/>

  <text x="150" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0392b">❌ Direct Dependency</text>
  <rect x="50" y="70" width="200" height="55" rx="8" fill="#f9d5d3" stroke="#c0392b" stroke-width="2"/>
  <text x="150" y="94" text-anchor="middle" font-size="13" fill="#2c3e50">UserService</text>
  <text x="150" y="112" text-anchor="middle" font-size="11" fill="#7f8c8d">(high-level)</text>

  <line x1="150" y1="125" x2="150" y2="170" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowRed)"/>

  <rect x="50" y="170" width="200" height="55" rx="8" fill="#f9d5d3" stroke="#c0392b" stroke-width="2"/>
  <text x="150" y="194" text-anchor="middle" font-size="13" fill="#2c3e50">MySQLDatabase</text>
  <text x="150" y="212" text-anchor="middle" font-size="11" fill="#7f8c8d">(low-level detail)</text>

  <text x="150" y="255" text-anchor="middle" font-size="12" fill="#c0392b">high-level depends directly</text>
  <text x="150" y="273" text-anchor="middle" font-size="12" fill="#c0392b">on a concrete low-level class</text>

  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#27ae60">✅ Inverted via Abstraction</text>

  <rect x="500" y="60" width="200" height="50" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="90" text-anchor="middle" font-size="13" fill="#2c3e50">UserService (high-level)</text>

  <line x1="600" y1="110" x2="600" y2="145" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <rect x="500" y="145" width="200" height="45" rx="8" fill="#ffffff" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="600" y="172" text-anchor="middle" font-size="13" fill="#27ae60">«interface» Database</text>

  <line x1="560" y1="190" x2="560" y2="225" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreenThin)"/>
  <line x1="640" y1="190" x2="640" y2="225" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreenThin)"/>

  <rect x="470" y="225" width="130" height="45" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="535" y="252" text-anchor="middle" font-size="12" fill="#2c3e50">MySQLDatabase</text>

  <rect x="605" y="225" width="130" height="45" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="670" y="252" text-anchor="middle" font-size="12" fill="#2c3e50">MongoDatabase</text>

  <text x="600" y="300" text-anchor="middle" font-size="12" fill="#27ae60">both high-level and low-level depend on the abstraction</text>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowGreenThin" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#27ae60"/>
    </marker>
  </defs>
</svg>
